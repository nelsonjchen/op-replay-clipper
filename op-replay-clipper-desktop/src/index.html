<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>OP Replay Clipper</title>
  <style>
    body {
      margin: 0;
      background: #0f1117;
      color: #8b90a0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    .loading { font-size: 16px; }
    .spinner {
      width: 24px; height: 24px;
      border: 3px solid #2e3345;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loading">
    <div class="spinner"></div>
    <p>Starting server...</p>
    <p style="font-size:12px; margin-top:8px; opacity:0.5;">The window will redirect when ready</p>
  </div>
</body>
</html>
