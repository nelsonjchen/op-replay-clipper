# NVIDIA GPU required for rendering. Prerequisites:
#   1. NVIDIA drivers installed (nvidia-smi should work)
#   2. NVIDIA Container Toolkit: https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/latest/install-guide.html
#   3. Test GPU access: docker run --rm --gpus all nvidia/cuda:12.4.1-base-ubuntu22.04 nvidia-smi

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "7860:7860"
    volumes:
      - ./shared:/app/shared
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - CLIPPER_IMAGE=op-replay-clipper-render
      - SHARED_HOST_DIR=${PWD}/shared
      - SHARED_LOCAL_DIR=/app/shared

  render:
    build:
      context: .
      dockerfile: Dockerfile
    image: op-replay-clipper-render
    profiles: ["build-only"]
    volumes:
      - ./shared:/src/shared
    shm_size: "1gb"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - NVIDIA_DRIVER_CAPABILITIES=all
