name: Build

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.12"
          - os: ubuntu-latest
            python-version: "3.13"
          - os: macos-latest
            python-version: "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.8.0"
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Sync locked environment
        run: uv sync --frozen --all-extras

      - name: Render Cog build artifacts
        run: ./cog/render_artifacts.sh

      - name: Compile Python sources
        run: uv run python -m compileall clip.py cog_predictor.py replicate_run.py core renderers tests

      - name: Smoke test CLI entrypoints
        run: |
          uv run python clip.py --help >/dev/null
          uv run python replicate_run.py --help >/dev/null

      - name: Run test suite
        run: uv run pytest
