name: Build

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.12"
          - os: ubuntu-latest
            python-version: "3.13"
          - os: macos-latest
            python-version: "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.8.0"
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Sync locked environment
        run: uv sync --frozen --all-extras

      - name: Install ffmpeg on macOS
        if: runner.os == 'macOS'
        run: |
          if command -v ffmpeg >/dev/null 2>&1; then
            echo "ffmpeg already available"
          else
            brew install ffmpeg
          fi

      - name: Render Cog build artifacts
        run: ./cog/render_artifacts.sh

      - name: Compile Python sources
        run: uv run python -m compileall clip.py cog_predictor.py replicate_run.py core renderers tests

      - name: Smoke test CLI entrypoints
        run: |
          uv run python clip.py --help >/dev/null
          uv run python replicate_run.py --help >/dev/null

      - name: Run test suite
        run: uv run pytest

  render-smoke:
    name: ubuntu-latest / Mici UI Smoke
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.8.0"
          python-version: "3.13"
          enable-cache: true

      - name: Sync locked environment
        run: uv sync --frozen --all-extras

      - name: Install UI render dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            capnproto \
            ffmpeg \
            git-lfs \
            libegl1-mesa-dev \
            libxcursor-dev \
            libxext-dev \
            libxi-dev \
            libxinerama-dev \
            libxrandr-dev \
            mesa-utils \
            xorg-dev \
            xserver-xorg-core \
            zstd

      - name: Render mici UI smoke clip
        run: bash ./common/render_mici_smoke.sh

      - name: Upload mici UI smoke artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mici-ui-smoke-${{ github.event_name }}
          path: |
            shared/ci-e2e/mici-ui-smoke.mp4
            shared/ci-e2e/mici-ui-smoke.png
            shared/ci-e2e/mici-ui-smoke.json
          if-no-files-found: warn
          retention-days: 7

  cog-build-smoke:
    name: ubuntu-latest / Cog Build Smoke
    if: github.ref == 'refs/heads/codex/add-github-actions-cog-build'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      COG_BUILDX_CACHE_PATH: ${{ runner.temp }}/cog-buildx-cache
      COG_BUILDX_CACHE_PREFIX: cog-buildx-v1-ubuntu-cog-yaml

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Free runner disk space
        run: |
          echo "Disk before cleanup:"
          df -h
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/share/swift
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          sudo apt-get clean
          docker system prune -af || true
          docker builder prune -af || true
          echo "Disk after cleanup:"
          df -h

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.8.0"
          python-version: "3.12"
          enable-cache: true

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Restore Cog BuildKit cache
        id: restore-cog-buildx-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.COG_BUILDX_CACHE_PATH }}
          key: ${{ env.COG_BUILDX_CACHE_PREFIX }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ${{ env.COG_BUILDX_CACHE_PREFIX }}-${{ github.ref_name }}-
            ${{ env.COG_BUILDX_CACHE_PREFIX }}-master-

      - name: Render Cog build artifacts
        run: ./cog/render_artifacts.sh

      - name: Install patched Cog with local BuildKit cache support
        run: |
          mkdir -p "${RUNNER_TEMP}/bin" "${COG_BUILDX_CACHE_PATH}"
          INSTALL_DIR="${RUNNER_TEMP}/bin" ./scripts/install_patched_cog_with_buildx_cache.sh
          echo "${RUNNER_TEMP}/bin" >> "${GITHUB_PATH}"

      - name: Print tool versions
        run: |
          python3 --version
          go version
          uv --version
          cog --version
          docker version
          du -sh "${COG_BUILDX_CACHE_PATH}" || true

      - name: Build Cog image
        run: cog build --progress plain -f cog.yaml

      - name: Show Cog BuildKit cache size
        if: always()
        run: du -sh "${COG_BUILDX_CACHE_PATH}" || true

      - name: Save Cog BuildKit cache
        if: always()
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: ${{ env.COG_BUILDX_CACHE_PATH }}
          key: ${{ steps.restore-cog-buildx-cache.outputs.cache-primary-key }}
