build:
  gpu: true
  python_version: "3.12"
  cuda: "12.4"
  python_requirements: requirements-cog.txt
  # bootstrap_image_env.sh is shared with local tooling, but Cog build.run still cannot read repo files directly.
  run:
    - "echo ENCODED_SCRIPT | base64 -d > bootstrap_image_env.sh && bash bootstrap_image_env.sh"
environment:
  - UV_BREAK_SYSTEM_PACKAGES=true
  - OP_REPLAY_CLIPPER_GIT_DESCRIBE=__CLIPPER_GIT_DESCRIBE__
predict: "cog_predictor.py:Predictor"
